_format_version: "2.1"
_transform: true

services:
  - name: auth-v1
    url: http://mtio-auth:9999
    routes:
      - name: auth-v1-route
        strip_path: true
        paths:
          - /auth/v1

  - name: rest-v1
    url: http://mtio-rest:3000
    routes:
      - name: rest-v1-route
        strip_path: true
        paths:
          - /rest/v1

  - name: storage-v1
    url: http://mtio-storage:5000
    routes:
      - name: storage-v1-route
        strip_path: true
        paths:
          - /storage/v1

plugins:
  - name: cors
    config:
      origins:
        - https://mtiosavljevic.com
        - https://www.mtiosavljevic.com
        - https://supabase.mtiosavljevic.com
        - https://studio.mtiosavljevic.com
        - http://localhost:3000
        - http://localhost:5173
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - X-Client-Info
        - apikey
        - x-supabase-api-version
      exposed_headers:
        - X-Kong-Upstream-Latency
        - X-Kong-Proxy-Latency
        - X-Forwarded-For
      credentials: true
      max_age: 3600
